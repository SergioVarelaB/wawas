<script>
  // 🔹 leer parámetro ?data=
  function getDataFromURL() {
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('data');

    if (!encoded) return null;

    try {
      const json = LZString.decompressFromEncodedURIComponent(encoded);
      return JSON.parse(json);
    } catch (e) {
      console.error('Error decoding data', e);
      return null;
    }
  }

  // 🔹 convertir data → HTML (compatible con tu revelador)
  function buildHTMLFromData(data) {
    let spans = '';

    data.charms.forEach((char, i) => {
      spans += `<span class="color${i}" style="color:#ff015b">${char}</span>`;
    });

    let extra = '';

    if (data.phone) {
      extra += `<img class="phone-charm" src="https://cdn.shopify.com/s/files/1/0500/2946/1654/t/3/assets/phonecharm.png">`;
    }

    return {
      spans,
      color: data.color,
      extra
    };
  }

  // 🔹 mapear color → clase
  function getCollarClass(color) {
    const map = {
      '1': 'collar1',
      '2': 'collar2',
      '3': 'collar3',
      '4': 'collar4',
      '5': 'collar5',
      '6': 'collar6',
      '7': 'collar7',
      '8': 'collar8'
    };

    return map[color] || '';
  }

  function getCollarColor(color) {
    const collarMap = {
      '1' : 'Naranja Neon',
      '2'  : 'Negro',
      '3'  :'Azul Rey',
      '4'  :'Amarillo Neon',
      '5'  :'Rosa Neon',
      '6'  :'Rojo',
      '7'  :'Morado',
      '8'  :'Azul Aqua'
    };
    return collarMap[color] || '';

  }

  function displayCharms(array) {
    let html = ''
    var phone = false
    for (let j = 0; j < array.length; j++) {
      if (array[j][0] != '#') {
        html = html + '<span class="color' + array[j][1] + '" style="color:' + numberToHex(array[j][1]) + '">' + array[j][0] + '</span>'
      } else {
        phone = true
      }
    }
    if (phone) {
      html = html + '<span><img class="phone-charm" src="https://cdn.shopify.com/s/files/1/0500/2946/1654/t/3/assets/phonecharm.png?v=2" alt="phone charm"></span>'
    }
    return `<div style="padding:16px">${html}</div>`
  }

  function numberToHex(num) {
    num = parseInt(num)
    switch (num) {
      case 1:
        return '#702F6E'
      case 2:
        return '#94E1EE'
      case 3:
        return '#ffd10e'
      case 4:
        return '#0341AD'
      case 5:
        return '#52B33F'
      case 6:
        return '#FF952B'
      case 7:
        return '#E43C27'
      case 8:
        return '#FF1363'
      case 9:
        return '#FFD7E0'
      case 10:
        return '#18FB93'
      case 11:
        return '#ff015b'
      case 12:
        return '#ff64dc'
      case 13:
        return '#ba0000'
      case 14:
        return '#ff5a00'
      case 15:
        return '#e1ff00'
      case 16:
        return '#00ff51'
      case 17:
        return '#00d6ff'
      case 18:
        return '#1900fa'
      case 19:
        return '#a080ff'
    }
  }


  function getExtras(data) {
    return `<div style="padding:16px; font-family: 'Outfit', sans-serif; font-weight: 500; ">Tamaño del collar: ${data.cS || "NA"}<br>Color del collar: ${data.colorCollar || "NA"} <br>Teléfono: ${data.p || "NA"}</div>`
  }

  function decodeCharms(str) {
    return str.split('.').map(item => {
      const [char, val] = item.split(',');
      return [char, Number(val)];
    });
  }

  function decodeGummies(str) {
    return str.split('.').map(item => {
      const [char, val] = item.split(',');
      return [char, val];
    });
  }
