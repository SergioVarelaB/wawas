<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HTML Revelador</title>

  <!-- 👉 Aquí puedes pegar tu CSS real -->
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    textarea {
      width: 45%;
      height: 400px;
      font-family: monospace;
      padding: 10px;
    }

    #preview {
      width: 45%;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow: auto;
      background: #fff;
    }
  </style>
  <link rel="stylesheet" href="https://sergiovarelab.github.io/wawas/styleWawas.css">
</head>
<body>

  <textarea id="input" placeholder="Pega aquí tu HTML..."></textarea>

  <div id="preview"></div>

  <script>
    const input = document.getElementById('input');
    const preview = document.getElementById('preview');

    input.addEventListener('input', () => {
      preview.innerHTML = input.value;
    });

    // opcional: ejemplo inicial
    input.value = `<div class="size-button">
  XS
  <span class="medidas">17-29cm</span>
</div>`;
    
    preview.innerHTML = input.value;
  </script>

</body>
</html>
