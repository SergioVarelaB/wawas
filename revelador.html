<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HTML Revelador</title>

  <!-- 👉 Aquí puedes pegar tu CSS real -->
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    textarea {
      width: 45%;
      height: 400px;
      font-family: monospace;
      padding: 10px;
    }

    #preview-collar {
      width: 45%;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow: auto;
      background: #fff;
    }
    #preview-extra {
      width: 45%;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow: auto;
      background: #fff;
    }
  </style>
  <link rel="stylesheet" href="https://sergiovarelab.github.io/wawas/styleWawas.css">
</head>
<body>

  <textarea id="input" placeholder="Pega aquí tu HTML..."></textarea>

  <!-- <div id="preview-extra"></div> -->
  <div id="preview-collar"></div>

  <script>
    const input = document.getElementById('input');

    input.addEventListener('input', () => {
      renderHTML(input.value)
    });

    // opcional: ejemplo inicial
    input.value = ``;
    
    // preview.innerHTML = input.value;

function renderHTML(htmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlString, 'text/html');

  const spans = [];
  const extras = [];
  let colorCollar = ''

  // 🔹 mapa de colores → clases
  const collarMap = {
    'Naranja Neon': 'collar1',
    'Negro': 'collar2',
    'Azul Rey': 'collar3',
    'Amarillo Neon': 'collar4',
    'Rosa Neon': 'collar5',
    'Rojo': 'collar6',
    'Morado': 'collar7',
    'Azul Aqua': 'collar8'
  };


  let i = 0;
  doc.body.childNodes.forEach(node => {
      // buscar spans tipo color
      if(i == 1){
        spans.push(node.outerHTML);
      }else if(i==0) {
        const text = node.innerText;
        const match = text.match(/Color del collar:\s*(.*?)\s*(Teléfono:|$)/);
        const color = match ? match[1].trim() : null;
        console.log(color); // "Azul Rey"
        if (color) {
        console.log(collarMap[color])
         if (collarMap[color]) {
          collarClass = collarMap[color];
          colorCollar = `<div class="collar ${collarClass}"></div>`
         }
      }
        extras.push(node.outerHTML);
      }
      i++
  });

  

  // 🔹 Wrapper del collar
  const collarHTML = `
